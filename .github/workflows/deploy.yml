name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Copy icons to web
        run: |
          mkdir -p web/icons
          cp assets/icons/gtp_icon_512.png web/icons/Icon-192.png
          cp assets/icons/gtp_icon_512.png web/icons/Icon-512.png
          cp assets/icons/gtp_icon_1024.png web/icons/Icon-maskable-192.png
          cp assets/icons/gtp_icon_1024.png web/icons/Icon-maskable-512.png

      - name: Build Web
        run: |
          flutter build web --release --base-href "/Global-Task-Planner/"
          rm -f build/web/flutter_service_worker.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
