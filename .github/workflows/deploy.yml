name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build Web
        run: |
          flutter pub get
          flutter build web --release --base-href "/Global-Task-Planner/"
          
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
                - uses: actions/checkout@v3
      
      - name: Change Directory
        run: cd Global-Task-Planner # اضافه شدن این خط برای ورود به پوشه
        
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

